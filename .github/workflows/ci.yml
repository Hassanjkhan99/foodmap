name: CI

# Runs before merge only (pull requests to main) + a manual button.
# No run on direct pushes. Zero-key: no secrets are used or required.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel a previous in-progress run on the same PR when new commits arrive,
# so rapid pushes don't stack up Actions minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Local PostGIS service (not an external credential) so the @foodmap/db
    # integration tests run in CI. Local dev stays zero-key: those tests skip
    # when DATABASE_URL is unset.
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/foodmap_test
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: foodmap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile, no external credentials)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + integration tests
        run: pnpm test

      - name: Build web (PWA)
        run: pnpm --filter @foodmap/web build

      - name: Install Playwright browser
        run: pnpm --filter @foodmap/web exec playwright install --with-deps chromium

      - name: E2E (Playwright, zero-key simulated flow)
        run: pnpm --filter @foodmap/web e2e
